server.port=8080

spring.application.name=ojas-backend

spring.datasource.url=${OJAS_DB_URL}
spring.datasource.username=${OJAS_DB_USERNAME}
spring.datasource.password=${OJAS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.naadi.ojas=DEBUG

# Show Spring Web request details
logging.level.org.springframework.web=DEBUG

# Show Spring Security logs
logging.level.org.springframework.security=DEBUG

# Show Mail / Gmail SMTP logs
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.mail.javamail=DEBUG
logging.level.jakarta.mail=DEBUG
logging.level.com.sun.mail=DEBUG

# JavaMail SMTP debug
spring.mail.properties.mail.debug=true


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${OJAS_MAIL_USERNAME}
spring.mail.password=${OJAS_MAIL_APP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===============================
# APP SECURITY
# ===============================
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# Comma separated frontend URLs
app.cors.allowed-origins=${OJAS_ALLOWED_ORIGINS:http://localhost:5173}

